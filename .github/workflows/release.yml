name: Release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    name: Pack & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to create GitHub Releases
      packages: write   # needed to publish to GitHub Packages
      # id-token: write   # needed for GitHub OIDC token issuance for this job

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer needs full history to compute version from tag

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/Aspire.Hosting.RemoteDebugging.Tests --no-build --configuration Release

      - name: Pack
        run: |
          dotnet pack src/Aspire.Hosting.RemoteDebugging/Aspire.Hosting.RemoteDebugging.csproj \
            --no-build \
            --configuration Release \
            --output ./nupkg

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./nupkg/*.nupkg

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/parithon/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./nupkg/*.nupkg
          generate_release_notes: true

      # Get a short-lived NuGet API key
