syntax = "proto3";

option csharp_namespace = "Aspire.Hosting.RemoteDebugging.Sidecar.Proto";

service SidecarService {
  // Health probe — returns immediately.
  rpc Ping (PingRequest) returns (PingResponse);

  // Start a project process on the remote host.
  rpc Start (StartRequest) returns (StartResponse);

  // Stop a running project process.
  rpc Stop (StopRequest) returns (StopResponse);

  // Query whether a project process is running.
  rpc GetStatus (StatusRequest) returns (StatusResponse);

  // Server-streaming: delivers buffered + live log lines until the client cancels.
  rpc StreamLogs (StreamLogsRequest) returns (stream LogLine);
}

message PingRequest {}
message PingResponse { string version = 1; }

message StartRequest {
  string project    = 1;
  string path       = 2;
  string executable = 3;
}
message StartResponse { int32 pid = 1; }

message StopRequest  { string project = 1; }
message StopResponse {}

message StatusRequest  { string project = 1; }
message StatusResponse {
  bool  running = 1;
  int32 pid     = 2;
}

message StreamLogsRequest {
  string project     = 1;
  int64  from_offset = 2;
}
message LogLine {
  string line   = 1;
  int64  offset = 2;
}
