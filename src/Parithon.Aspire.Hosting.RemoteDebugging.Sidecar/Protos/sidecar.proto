syntax = "proto3";

import "google/protobuf/timestamp.proto";

option csharp_namespace = "Parithon.Aspire.Hosting.RemoteDebugging.Sidecar";

package sidecar.v1;

// SidecarService manages the lifecycle of .NET child processes on the remote host and streams
// their stdout/stderr back to the AppHost over a persistent gRPC connection.
service SidecarService {
  // Health check.  Clients should call this every ~30 s to reset the inactivity timer.
  rpc Ping(PingRequest) returns (PingResponse);

  // Deploy and start a managed .NET process on the remote host.
  rpc StartProcess(StartProcessRequest) returns (StartProcessResponse);

  // Stop a managed process by logical name.
  rpc StopProcess(StopProcessRequest) returns (StopProcessResponse);

  // Enumerate all managed processes and their current states.
  rpc ListProcesses(ListProcessesRequest) returns (ListProcessesResponse);

  // Stream stdout/stderr from a managed process.  Optionally replays cached lines first,
  // then delivers live output until the client cancels the call.
  rpc StreamLogs(StreamLogsRequest) returns (stream LogLine);

  // Gracefully stop all managed processes and shut down the sidecar itself.
  // The AppHost should call this before closing the SSH connection.
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);

  // Stop all managed processes from the previous session and reset sidecar state,
  // so the same running sidecar instance can be reused by a new AppHost session.
  rpc Reset(ResetRequest) returns (ResetResponse);
}

// ── Ping ─────────────────────────────────────────────────────────────────────

message PingRequest {}

message PingResponse {
  string version              = 1;
  int32  active_process_count = 2;
}

// ── StartProcess ─────────────────────────────────────────────────────────────

message StartProcessRequest {
  // Logical name that identifies the process (matches the Aspire resource name).
  string name              = 1;
  string working_directory = 2;
  // Entry-point DLL filename, e.g. "MyApp.dll". Invoked as `dotnet <entry_point>` unless
  // `executable` is set, in which case it is passed as the argument string to that executable.
  string entry_point       = 3;
  // Environment variables to inject into the child process.
  map<string, string> environment = 4;
  // Optional: override the default "dotnet" executable. When set, the process is launched as
  // `<executable> <entry_point>` instead of `dotnet <entry_point>`. Use for non-dotnet
  // processes such as "powershell.exe" for log-watcher scripts.
  string executable        = 5;
}

message StartProcessResponse {
  int64 pid             = 1;
  // True when the process was already running; no new process was spawned.
  bool  already_running = 2;
}

// ── StopProcess ──────────────────────────────────────────────────────────────

message StopProcessRequest {
  string name = 1;
}

message StopProcessResponse {
  bool success = 1;
}

// ── ListProcesses ────────────────────────────────────────────────────────────

message ListProcessesRequest {}

message ProcessInfo {
  string name  = 1;
  int64  pid   = 2;
  // String representation of ProcessState enum (e.g. "Running", "Stopped").
  string state = 3;
}

message ListProcessesResponse {
  repeated ProcessInfo processes = 1;
}

// ── StreamLogs ───────────────────────────────────────────────────────────────

message StreamLogsRequest {
  string name          = 1;
  // When true the server replays all cached log lines before streaming live output.
  bool   replay_cached = 2;
}

message LogLine {
  google.protobuf.Timestamp timestamp = 1;
  string content  = 2;
  bool   is_error = 3;
}

// ── Shutdown ──────────────────────────────────────────────────────────────────

message ShutdownRequest {}

message ShutdownResponse {
  // True when all managed processes were stopped before the sidecar exited.
  bool success = 1;
}

// ── Reset ─────────────────────────────────────────────────────────────────────

message ResetRequest {}

message ResetResponse {
  // Number of managed processes that were stopped during the reset.
  int32 processes_stopped = 1;
}
